# ── Nginx Reverse Proxy — HTTP (pre-SSL / ACME challenge) ─────────────────────
#
# After running init-ssl.sh, replace this file with ssl.conf:
#   cp nginx/ssl.conf nginx/default.conf
#   docker compose exec nginx nginx -s reload
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Allow large file uploads (loan screenshots, avatars)
    client_max_body_size 10m;

    # Let's Encrypt ACME challenge — certbot writes tokens here
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── API → backend container ──────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Uploads → backend container ──────────────────────────────────────────
    location /uploads {
        proxy_pass       http://backend:3000;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend → React SPA container ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
