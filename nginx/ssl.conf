# ── Nginx Reverse Proxy — HTTPS ───────────────────────────────────────────────
#
# Usage: after running scripts/init-ssl.sh, activate this config:
#   sed -i 's/yourdomain.com/ACTUAL_DOMAIN/g' nginx/ssl.conf
#   cp nginx/ssl.conf nginx/default.conf
#   docker compose exec nginx nginx -s reload
# ──────────────────────────────────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # ACME challenge must still work on port 80 for cert renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificate (provisioned by certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            SAMEORIGIN                            always;
    add_header X-Content-Type-Options     nosniff                               always;

    # Allow large file uploads (loan screenshots, avatars)
    client_max_body_size 10m;

    # ── API → backend container ──────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Uploads → backend container ──────────────────────────────────────────
    location /uploads {
        proxy_pass       http://backend:3000;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend → React SPA container ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host      $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
