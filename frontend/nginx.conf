# Nginx config for the React SPA container (internal port 80)
# The outer nginx reverse-proxy routes traffic to this container.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        image/svg+xml;

    # Cache-bust static assets aggressively (CRA appends content hashes to filenames)
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html: never cache (always fetch fresh so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # React Router: all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
